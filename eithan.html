<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Eithan</title>
<style>
  :root{--bg:#0b0d12;--fg:#f5f7fa;--gap:20px;--radius:18px}
  html,body{height:100%;margin:0;background:radial-gradient(circle at 50% -10%, #1c2130 0%, var(--bg) 55%);color:var(--fg);font-family:system-ui,Arial}
  .wrap{padding:28px;display:flex;flex-direction:column;height:100%}
  header{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
  .content{display:grid;grid-template-columns:300px 1fr;gap:var(--gap);flex:1;margin-top:24px;min-height:0}
  .list{display:flex;flex-direction:column;gap:12px;overflow:auto;padding-right:6px}
  .tile{background:rgba(255,255,255,.06);border-radius:var(--radius);padding:12px;display:flex;align-items:center;gap:10px;cursor:pointer;color:inherit;border:none;text-align:left;min-height:84px}
  .tile.active{outline:2px solid #8bd3ff;background:rgba(139,211,255,.16)}
  .badge{width:44px;height:44px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;color:#111;font-weight:800;flex-shrink:0}
  .player{background:#000;border-radius:var(--radius);overflow:hidden;min-height:0;display:flex;flex-direction:column;min-height:520px}
  .player .player-head{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:rgba(255,255,255,.08);color:#fff;font-size:.95rem}
  .player .player-head button{background:rgba(255,255,255,.16);border:none;border-radius:999px;padding:8px 12px;color:#fff;cursor:pointer}
  .player #yt-player{width:100%;height:100%;flex:1;background:#000}
  a{color:inherit;text-decoration:none}
  @media(max-width:900px){.cards{grid-template-columns:1fr}.player{min-height:320px}}
  footer{margin-top:18px;color:#9aa0b3}
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Eithan</h1>
      <a href="index.html">← Volver</a>
    </header>

    <main class="content">
      <div class="list" id="grid"></div>
      <div class="player" id="player">
        <div class="player-head">
          <span id="player-title">Seleccioná un video</span>
          <button id="close-player" type="button">Volver</button>
        </div>
        <div id="yt-player"></div>
      </div>
    </main>

    <footer>
      Videos de Zamba y Plaza Sésamo.
    </footer>
  </div>

<script>
const items = [
  {name:'✨Episodio 3 - Las Asombrosas Aventuras de la Nave Zamba 🚀🚀', videoId:'nHqvCFtS_3w'},
  {name:'Zamba descubre el gran secreto de Manuel Belgrano | La Asombrosa Excursión de Zamba', videoId:'fB-h3O_P61s'},
  {name:'¿Qué pasaría si Belgrano NO hubiera creado la bandera? Parte 1 | Zamba en el Monumento a la Bandera', videoId:'69mjOCvlmXA'},
  {name:'🦕 Zamba y los Dinosaurios: una aventura jurásica 🌋🌍 | Mundo Zamba', videoId:'Y-8y5O0xlYM'},
  {name:'¡Canta, Juega y Aprende! | Clásicos de Baby Einstein | @BabyEinsteinenEspanol', videoId:'MLgfEYwlvNU'},
  {name:'Aprender a leer con El Mono Silabo. Todos Los Capítulos. Videos Para Niños. Lunacreciente', videoId:'c2peYoOxNck'},
  {name:'Plaza Sésamo: ¡Letras, números, canciones y aventuras! | Live', videoId:'OBUqotePuWE'},
  {name:'Plaza Sésamo: El abecedario de Plaza Sésamo', videoId:'yuLqKKyE4sg'}
];

const grid = document.getElementById('grid');
const playerTitle = document.getElementById('player-title');
const closePlayerBtn = document.getElementById('close-player');
let player;
let locked = false;

items.forEach((item, index) => {
  const btn = document.createElement('button');
  btn.className = 'tile';
  btn.onclick = () => showVideo(item, index);
  btn.innerHTML = `
    <div class="badge">▶</div>
    <div>${item.name}</div>
  `;
  grid.appendChild(btn);
});

function showVideo(item, index) {
 // if (locked) return;
  Array.from(grid.children).forEach((child, i) => child.classList.toggle('active', i === index));

  playerTitle.textContent = item.name;
  //locked = true;
 // setButtonsDisabled(true);
  if (!player) {
    player = new YT.Player('yt-player', {
      height: '100%',
      width: '100%',
      videoId: item.videoId,
      playerVars: {rel: 0, modestbranding: 1, playsinline: 1, autoplay: 1, controls: 1},
      events: {onStateChange: onPlayerStateChange}
    });
  } else {
    player.loadVideoById(item.videoId);
  }
}

function onPlayerStateChange(event) {
  if (event.data === YT.PlayerState.ENDED) {
    locked = false;
    setButtonsDisabled(false);
  }
}

function setButtonsDisabled(disabled) {
  Array.from(grid.children).forEach((btn) => {
    btn.disabled = disabled;
    btn.style.opacity = disabled ? '.6' : '1';
  });
}

closePlayerBtn.addEventListener('click', () => {
  locked = false;
  setButtonsDisabled(false);
  if (player) {
    player.stopVideo();
  }
  playerTitle.textContent = 'Seleccioná un video';
});

const tag = document.createElement('script');
tag.src = 'https://www.youtube.com/iframe_api';
document.body.appendChild(tag);
window.onYouTubeIframeAPIReady = () => {
  playerTitle.textContent = 'Seleccioná un video';
};
</script>
</body>
</html>
